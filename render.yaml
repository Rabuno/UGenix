services:
  # 1. Backend API (Dockerized)
  - type: web
    name: ugenix-api
    env: docker
    dockerContext: ugenix-backend
    dockerfilePath: ugenix-backend/src/UGenix.API/Dockerfile
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:10000
      - key: PORT
        value: "10000"
      - key: ConnectionStrings__Database
        fromDatabase:
          name: ugenix-db
          property: internalConnectionString
      - key: ConnectionStrings__Redis
        fromService:
          type: redis
          name: ugenix-redis
          property: internalConnectionString
    envVarGroups:
      - ugenix-shared-env

  # 2. Frontend + Nginx (Dockerized)
  - type: web
    name: ugenix-web
    env: docker
    dockerContext: ugenix-frontend
    dockerfilePath: ugenix-frontend/Dockerfile
    plan: free
    envVars:
      - key: VITE_API_BASE_URL
        value: /api
      - key: API_URL
        fromService:
          type: web
          name: ugenix-api
          property: hostport
    # Nginx acts as the entry point here

  # 3. Redis (Cache)
  - type: redis
    name: ugenix-redis
    plan: free
    ipAllowList: [] # Only internal access

databases:
  # 4. PostGIS Database
  - name: ugenix-db
    plan: free
    databaseName: ugenix
    user: ugenix_admin

