server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Enable serving pre-compressed files
    gzip_static on;

    # Security Headers
    add_header X-Frame-Options "DENY";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://maps.vietmap.vn https://*.vietmap.vn; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://maps.vietmap.vn https://*.vietmap.vn; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https://*.cloudinary.com https://*.onrender.com https://maps.vietmap.vn https://*.vietmap.vn; connect-src 'self' https://*.onrender.com https://*.supabase.co https://*.vietmap.vn https://maps.vietmap.vn;";

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache Control for static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
        
        # Repeat Security Headers (Nginx inheritance rule: add_header in location replaces server-level)
        add_header X-Frame-Options "DENY";
        add_header X-Content-Type-Options "nosniff";
        add_header X-XSS-Protection "1; mode=block";
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://maps.vietmap.vn https://*.vietmap.vn; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://maps.vietmap.vn https://*.vietmap.vn; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https://*.cloudinary.com https://*.onrender.com https://maps.vietmap.vn https://*.vietmap.vn; connect-src 'self' https://*.onrender.com https://*.supabase.co https://*.vietmap.vn https://maps.vietmap.vn;";
    }

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://__API_URL__;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
