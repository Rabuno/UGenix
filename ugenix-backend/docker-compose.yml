version: '3.8'

services:
  ugenix-db:
    image: postgis/postgis:15-3.3
    container_name: ugenix-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DATABASE}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ugenix-internal

  ugenix-redis:
    image: redis:7.0-alpine
    container_name: ugenix-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ugenix-internal

  ugenix-seq:
    image: datalust/seq:latest
    container_name: ugenix-seq
    restart: always
    environment:
      ACCEPT_EULA: Y
    ports:
      - "5341:80"
    networks:
      - ugenix-internal

  ugenix-api:
    build:
      context: .
      dockerfile: src/UGenix.API/Dockerfile
    container_name: ugenix-api
    depends_on:
      ugenix-db:
        condition: service_healthy
      ugenix-redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Database: Host=ugenix-db;Database=${POSTGRES_DATABASE};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      ConnectionStrings__Redis: ugenix-redis:6379
      Serilog__WriteTo__1__Args__serverUrl: http://ugenix-seq:80
    security_opt:
      - no-new-privileges:true
    read_only: true
    user: 1001:1001
    tmpfs:
      - /tmp
      - /app/logs
    ports:
      - "5000:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ugenix-internal

  ugenix-web:
    build:
      context: ../ugenix-frontend
      dockerfile: Dockerfile
    container_name: ugenix-web
    ports:
      - "80:80"
    depends_on:
      - ugenix-api
    networks:
      - ugenix-internal

networks:
  ugenix-internal:
    driver: bridge

volumes:
  postgres_data:

