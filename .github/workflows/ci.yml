name: UGenix CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  backend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 9.0.x
      - name: Restore dependencies
        run: dotnet restore ugenix-backend/UGenix.sln
      - name: Build
        run: dotnet build ugenix-backend/UGenix.sln --no-restore
      - name: Test
        run: dotnet test ugenix-backend/UGenix.sln --no-build --verbosity normal

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20
      - name: Install dependencies
        run: cd ugenix-frontend && npm install
      - name: Lint
        run: cd ugenix-frontend && npm run lint
      - name: Unit Tests
        run: cd ugenix-frontend && npm run test
      - name: Install Playwright Browsers
        run: cd ugenix-frontend && npx playwright install --with-deps
      - name: E2E Tests
        run: cd ugenix-frontend && npm run test:e2e
      - name: Build
        run: cd ugenix-frontend && npm run build

